# MATHIR research/benchmark config (full quality)
# Largest capacities, no compression, GPU float32, higher prototype count.

memory:
  embedding_dim: 4096
  internal_dim: 272
  working_capacity: 128
  episodic_capacity: 5000
  semantic_prototypes: 512
  immunological_capacity: 200
  kl_coefficient: 0.005
  anomaly_threshold: 1.5
  decay_rates: [0.95, 0.8, 0.6]

compression:
  enabled: false
  method: turboquant
  bits: 8
  episodic_only: false

inference:
  backend: pytorch
  device: cuda
  precision: float32

router:
  type: kl_constrained
  num_memories: 4
  entropy_coefficient: 0.02
  temperature: 1.0

providers:
  default: huggingface
  huggingface:
    model: Qwen/Qwen2.5-7B-Instruct
    device: cuda
