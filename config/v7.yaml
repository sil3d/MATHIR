# MATHIR V7 — Full theoretical configuration
# All V7 improvements enabled

memory:
  embedding_dim: 4096
  internal_dim: 272
  working_capacity: 64
  episodic_capacity: 1000
  semantic_prototypes: 256
  immunological_capacity: 100
  kl_coefficient: 0.01
  anomaly_threshold: 2.0
  decay_rates: [0.9, 0.7, 0.5]

  # V7 — high impact
  episodic_type: ebbinghaus           # Ebbinghaus forgetting (Theorem 2)
  semantic_type: hyperbolic            # Poincaré ball embeddings
  immune_type: mahalanobis            # NP-optimal anomaly (Theorem 4)
  use_variational: true                # Variational episodic (uncertainty)
  use_sparse_coding: true              # 5th tier: sparse codes (Theorem 5)
  use_cross_attention: true            # Learned Q/K/V addressing
  use_neural_ode: true                 # Continuous-time memory
  use_infonce: true                    # Mutual information learning

  # V7 hyperparameters
  ebbinghaus_alpha: 0.5
  sparse_atoms: 1088
  sparse_sparsity: 8
  variational_min_sigma: 0.01
  neural_ode_dt: 0.1
  neural_ode_steps: 3
  infonce_temperature: 0.1

compression:
  enabled: true
  method: turboquant
  bits: 3
  episodic_only: false

inference:
  backend: pytorch
  device: auto
  precision: float32

router:
  type: kl_constrained
  num_memories: 4
  entropy_coefficient: 0.01
  temperature: 1.0

providers:
  default: direct
