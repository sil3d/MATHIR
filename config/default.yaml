# MATHIR default configuration
# Balanced for general-purpose LLM use (CPU/GPU).

memory:
  embedding_dim: 384
  internal_dim: 272
  working_capacity: 64
  episodic_capacity: 1000
  semantic_prototypes: 256
  immunological_capacity: 100
  kl_coefficient: 0.01
  anomaly_threshold: 2.0
  decay_rates: [0.9, 0.7, 0.5]

compression:
  enabled: true
  method: turboquant
  bits: 3
  episodic_only: false

inference:
  backend: pytorch
  device: auto
  device_map: null  # Set to enable hybrid mode
  # device_map:
  #   working: cuda:0
  #   episodic: cpu
  #   semantic: cuda:0
  #   immune: cpu
  #   router: cuda:0
  precision: float32

router:
  type: kl_constrained
  num_memories: 4
  entropy_coefficient: 0.01
  temperature: 1.0

# HybridSearch — auto-scaling vector backend
hybrid_search:
  enabled: true
  strategy: auto          # "auto" | "numpy" | "usearch" | null
  # auto: numpy < 5000, USearch HNSW >= 5000
  # numpy: brute-force cosine (fastest for small N)
  # usearch: HNSW with memory-mapped index (best for large N)
  numpy_threshold: 5000  # Auto-switch threshold
  index_dir: mathir_indexes  # USearch index persistence dir

  # sqlite-vec config (used by VecMemory / GPUVecMemory)
  sqlite_vec:
    wal_mode: true
    synchronous: normal   # "full" | "normal" | "off"
    cache_size: -8000     # Negative = KB
    mmap_size: 268435456  # 256MB memory-mapped I/O
    temp_store: memory
    cache_capacity: 512   # LRU query cache entries
    cache_ttl: 120.0      # Seconds before cache expiry

  # USearch HNSW tuning (for 384d embeddings)
  usearch:
    metric: cosine
    connectivity: 32       # HNSW M parameter (default ~16)
    expansion_add: 256     # ef_construction (default ~128)
    expansion_search: 128  # ef search (default ~64)

# Brain Architecture (v8.3+) — 5-phase proactive memory
# See docs/BRAIN_ARCHITECTURE.md for full details
brain:
  enabled: true
  inject_proxy:
    enabled: true
    target: http://localhost:8181  # Your LLM API
    port: 8182                      # Proxy port
    timeout_ms: 300                 # Max recall time per request
    max_memories: 3                 # Top-K to inject
  watchdog:
    enabled: true
    interval_seconds: 15            # Ping interval
    cooldown_seconds: 10            # Wait after restart
    max_restarts: 0                 # 0 = infinite
  spread:
    enabled: true
    link_threshold: 0.7             # Cosine similarity to build link
    max_links_per_memory: 10
    hops: 2                         # Spreading depth
    decay: 0.5                      # Per-hop decay
  consolidate:
    enabled: true
    duplicate_threshold: 0.95
    decay_rate: 0.05                # 5%/month for unused
    archive_threshold: 0.05
  prime:
    enabled: true
    include_git: true
    include_recent_files: true
    recent_files_hours: 24
    max_recent_files: 5

providers:
  default: direct
  embedding:
    model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2  # 384d, multilingual 50+, low VRAM
    device: auto
    backend: sentence-transformers
  ollama:
    url: http://localhost:11434
    model: llama3.2:3b
  openai:
    api_key: null
    model: text-embedding-3-small
  huggingface:
    model: Qwen/Qwen2.5-7B-Instruct
    device: auto
