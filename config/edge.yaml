# MATHIR edge deployment config (constrained hardware)
# Smallest embedding, fewer slots, ONNX int8, episodic-only compression.

memory:
  embedding_dim: 1024
  internal_dim: 272
  working_capacity: 32
  episodic_capacity: 256
  semantic_prototypes: 64
  immunological_capacity: 32
  kl_coefficient: 0.01
  anomaly_threshold: 2.0
  decay_rates: [0.9, 0.7]

compression:
  enabled: true
  method: turboquant
  bits: 3
  episodic_only: true

inference:
  backend: onnx
  device: cpu
  precision: int8

router:
  type: kl_constrained
  num_memories: 4
  entropy_coefficient: 0.01
  temperature: 1.0

providers:
  default: ollama
  ollama:
    url: http://localhost:11434
    model: llama3.2:1b
