<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" width="900" height="650" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <!-- Gradients -->
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>

    <linearGradient id="mcpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>

    <linearGradient id="daemonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <linearGradient id="tier1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <linearGradient id="tier2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>

    <linearGradient id="tier3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>

    <linearGradient id="tier4Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>

    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>

    <linearGradient id="embGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>

    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="650" fill="#fafafa"/>

  <!-- Title -->
  <text x="450" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#1f2937">MATHIR Architecture</text>
  <text x="450" y="58" font-size="13" text-anchor="middle" fill="#6b7280">Memory-Augmented Tensor Hybrid with Intelligent Routing</text>

  <!-- LAYER 1: AI Agent (top) -->
  <g filter="url(#shadow)">
    <rect x="300" y="80" width="300" height="60" rx="8" fill="url(#agentGrad)"/>
    <text x="450" y="108" font-size="16" font-weight="bold" text-anchor="middle" fill="white">AI Agent / LLM</text>
    <text x="450" y="128" font-size="11" text-anchor="middle" fill="white" fill-opacity="0.9">Claude · GPT · Ollama · Any MCP client</text>
  </g>

  <!-- Arrow down to MCP -->
  <line x1="450" y1="140" x2="450" y2="180" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="465" y="163" font-size="10" fill="#6b7280">JSON-RPC over stdio</text>

  <!-- LAYER 2: MCP Server -->
  <g filter="url(#shadow)">
    <rect x="250" y="180" width="400" height="80" rx="8" fill="url(#mcpGrad)"/>
    <text x="450" y="210" font-size="16" font-weight="bold" text-anchor="middle" fill="white">MCP Server</text>
    <text x="450" y="230" font-size="11" text-anchor="middle" fill="white" fill-opacity="0.9">10 tools · 4 prompt resources · tool discovery</text>
    <text x="450" y="248" font-size="10" text-anchor="middle" fill="white" fill-opacity="0.7">memory_save · memory_recall · memory_smart_search · memory_hybrid_search</text>
  </g>

  <!-- Arrow down to Daemon -->
  <line x1="450" y1="260" x2="450" y2="300" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="465" y="283" font-size="10" fill="#6b7280">TCP socket · port 7338</text>

  <!-- LAYER 3: MATHIR Daemon (the brain) -->
  <g filter="url(#shadow)">
    <rect x="200" y="300" width="500" height="70" rx="8" fill="url(#daemonGrad)"/>
    <text x="450" y="328" font-size="16" font-weight="bold" text-anchor="middle" fill="white">MATHIR Daemon</text>
    <text x="450" y="348" font-size="11" text-anchor="middle" fill="white" fill-opacity="0.9">Persistent process · embedder pre-loaded · thread-safe · 50 concurrent connections</text>
  </g>

  <!-- Arrow down to 4 tiers -->
  <line x1="450" y1="370" x2="450" y2="400" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LAYER 4: 4 Memory Tiers -->
  <g>
    <!-- Working Memory -->
    <g filter="url(#shadow)">
      <rect x="60" y="410" width="180" height="80" rx="8" fill="url(#tier1Grad)"/>
      <text x="150" y="435" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Working Memory</text>
      <text x="150" y="455" font-size="10" text-anchor="middle" fill="white" fill-opacity="0.9">Current context</text>
      <text x="150" y="472" font-size="10" text-anchor="middle" fill="white" fill-opacity="0.9">Fast · ephemeral</text>
    </g>
    <line x1="240" y1="450" x2="280" y2="370" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="3,3"/>

    <!-- Episodic Memory -->
    <g filter="url(#shadow)">
      <rect x="270" y="410" width="180" height="80" rx="8" fill="url(#tier2Grad)"/>
      <text x="360" y="435" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Episodic Memory</text>
      <text x="360" y="455" font-size="10" text-anchor="middle" fill="white" fill-opacity="0.9">Events · sessions</text>
      <text x="360" y="472" font-size="10" text-anchor="middle" fill="white" fill-opacity="0.9">Timestamped</text>
    </g>
    <line x1="360" y1="410" x2="400" y2="370" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="3,3"/>

    <!-- Semantic Memory -->
    <g filter="url(#shadow)">
      <rect x="480" y="410" width="180" height="80" rx="8" fill="url(#tier3Grad)"/>
      <text x="570" y="435" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Semantic Memory</text>
      <text x="570" y="455" font-size="10" text-anchor="middle" fill="white" fill-opacity="0.9">Knowledge · facts</text>
      <text x="570" y="472" font-size="10" text-anchor="middle" fill="white" fill-opacity="0.9">Cross-session</text>
    </g>
    <line x1="540" y1="410" x2="500" y2="370" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="3,3"/>

    <!-- Procedural Memory -->
    <g filter="url(#shadow)">
      <rect x="690" y="410" width="180" height="80" rx="8" fill="url(#tier4Grad)"/>
      <text x="780" y="435" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Procedural Memory</text>
      <text x="780" y="455" font-size="10" text-anchor="middle" fill="white" fill-opacity="0.9">How-to · recipes</text>
      <text x="780" y="472" font-size="10" text-anchor="middle" fill="white" fill-opacity="0.9">Actionable skills</text>
    </g>
    <line x1="660" y1="450" x2="620" y2="370" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="3,3"/>
  </g>

  <!-- Arrows down to storage -->
  <line x1="150" y1="490" x2="150" y2="540" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="360" y1="490" x2="360" y2="540" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="570" y1="490" x2="570" y2="540" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="780" y1="490" x2="780" y2="540" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- LAYER 5: Embedder (left) + Storage (center+right) -->
  <!-- Embedder -->
  <g filter="url(#shadow)">
    <rect x="60" y="545" width="180" height="60" rx="8" fill="url(#embGrad)"/>
    <text x="150" y="570" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Embedder</text>
    <text x="150" y="588" font-size="10" text-anchor="middle" fill="white" fill-opacity="0.9">MiniLM-L12 · 384d · GPU</text>
  </g>

  <!-- Connection embedder to daemon (left side) -->
  <path d="M 240 575 Q 270 500 250 370" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,4" fill="none" marker-end="url(#arrowGreen)"/>

  <!-- Vector DB -->
  <g filter="url(#shadow)">
    <rect x="280" y="545" width="180" height="60" rx="8" fill="url(#dbGrad)"/>
    <text x="370" y="570" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Vector Index</text>
    <text x="370" y="588" font-size="10" text-anchor="middle" fill="white" fill-opacity="0.9">sqlite-vec · cosine</text>
  </g>

  <!-- SQLite -->
  <g filter="url(#shadow)">
    <rect x="490" y="545" width="180" height="60" rx="8" fill="url(#dbGrad)"/>
    <text x="580" y="570" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Metadata DB</text>
    <text x="580" y="588" font-size="10" text-anchor="middle" fill="white" fill-opacity="0.9">SQLite · thread-safe</text>
  </g>

  <!-- BM25 Index -->
  <g filter="url(#shadow)">
    <rect x="700" y="545" width="180" height="60" rx="8" fill="url(#dbGrad)"/>
    <text x="790" y="570" font-size="13" font-weight="bold" text-anchor="middle" fill="white">BM25 Index</text>
    <text x="790" y="588" font-size="10" text-anchor="middle" fill="white" fill-opacity="0.9">Lexical · hybrid</text>
  </g>

  <!-- Bottom: Data Flow Labels -->
  <g font-size="10" fill="#6b7280">
    <!-- Left side: Embedding generation -->
    <text x="50" y="510" text-anchor="end">embed →</text>

    <!-- Tier labels -->
    <text x="150" y="510" text-anchor="middle">store</text>
    <text x="360" y="510" text-anchor="middle">store</text>
    <text x="570" y="510" text-anchor="middle">store</text>
    <text x="780" y="510" text-anchor="middle">store</text>
  </g>

  <!-- Bottom annotations -->
  <g font-size="10" fill="#9ca3af">
    <text x="60" y="630" text-anchor="start">🔌 MCP protocol</text>
    <text x="450" y="630" text-anchor="middle">🧠 4-tier memory model</text>
    <text x="840" y="630" text-anchor="end">💾 Local-first · portable</text>
  </g>
</svg>
