<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0f0f1e" stop-opacity="0.05"/>
    </radialGradient>

    <!-- Core node gradient -->
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="40%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </radialGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>

  <!-- Outer orbital ring -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="2,4"/>

  <!-- Inner orbital ring -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="1,3"/>

  <!-- Neural pathways (extending outward) -->
  <g stroke-linecap="round" filter="url(#glow)">
    <!-- Top -->
    <line x1="200" y1="130" x2="200" y2="60" stroke="#8b5cf6" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="200" cy="50" r="4" fill="#a78bfa"/>

    <!-- Top-right -->
    <line x1="270" y1="155" x2="335" y2="115" stroke="#22c55e" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="340" cy="110" r="4" fill="#22c55e"/>

    <!-- Right -->
    <line x1="270" y1="200" x2="345" y2="200" stroke="#8b5cf6" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="350" cy="200" r="4" fill="#a78bfa"/>

    <!-- Bottom-right -->
    <line x1="270" y1="245" x2="335" y2="285" stroke="#22c55e" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="340" cy="290" r="4" fill="#22c55e"/>

    <!-- Bottom -->
    <line x1="200" y1="270" x2="200" y2="340" stroke="#8b5cf6" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="200" cy="350" r="4" fill="#a78bfa"/>

    <!-- Bottom-left -->
    <line x1="130" y1="245" x2="65" y2="285" stroke="#22c55e" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="60" cy="290" r="4" fill="#22c55e"/>

    <!-- Left -->
    <line x1="130" y1="200" x2="55" y2="200" stroke="#8b5cf6" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="50" cy="200" r="4" fill="#a78bfa"/>

    <!-- Top-left -->
    <line x1="130" y1="155" x2="65" y2="115" stroke="#22c55e" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="60" cy="110" r="4" fill="#22c55e"/>
  </g>

  <!-- Hexagonal memory nodes (4 corners) -->
  <g filter="url(#softGlow)">
    <polygon points="200,80 220,95 220,125 200,140 180,125 180,95" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.6"/>
    <polygon points="320,200 335,220 335,260 320,280 305,260 305,220" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.6"/>
    <polygon points="200,320 220,335 220,365 200,380 180,365 180,335" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.6"/>
    <polygon points="80,200 95,220 95,260 80,280 65,260 65,220" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.6"/>
  </g>

  <!-- Core memory node -->
  <g filter="url(#softGlow)">
    <circle cx="200" cy="200" r="60" fill="url(#coreGrad)" stroke="#a78bfa" stroke-width="2"/>
  </g>

  <!-- Inner core pattern (synaptic) -->
  <g stroke="#ffffff" stroke-width="1.5" fill="none" stroke-opacity="0.8">
    <!-- Synaptic connections -->
    <line x1="200" y1="170" x2="200" y2="230"/>
    <line x1="170" y1="200" x2="230" y2="200"/>
    <line x1="178" y1="178" x2="222" y2="222"/>
    <line x1="222" y1="178" x2="178" y2="222"/>
  </g>

  <!-- Central dot -->
  <circle cx="200" cy="200" r="8" fill="#ffffff" filter="url(#glow)"/>

  <!-- Small synaptic nodes around core -->
  <g fill="#ffffff" filter="url(#glow)">
    <circle cx="200" cy="170" r="2.5"/>
    <circle cx="200" cy="230" r="2.5"/>
    <circle cx="170" cy="200" r="2.5"/>
    <circle cx="230" cy="200" r="2.5"/>
    <circle cx="178" cy="178" r="2.5"/>
    <circle cx="222" cy="222" r="2.5"/>
    <circle cx="222" cy="178" r="2.5"/>
    <circle cx="178" cy="222" r="2.5"/>
  </g>

  <!-- M monogram in center (subtle) -->
  <text x="200" y="218" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#ffffff" fill-opacity="0.9" text-anchor="middle" letter-spacing="2">M</text>
</svg>
